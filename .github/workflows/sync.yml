# DO NOT REMOVE - Required for automatic deployment sync to production
name: Sync to tradeha42-cloud

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Push to target repo
        env:
          TOKEN: ${{ secrets.TARGET_PAT }}
        run: |
          git clone --bare https://github.com/Bionic-Pro/Bioniclabs-New.git repo
          cd repo
          git push --mirror https://tradeha42-cloud:$TOKEN@github.com/tradeha42-cloud/bioniclabs19032026.git
