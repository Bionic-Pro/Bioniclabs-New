name: Sync to tradeha42-cloud

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repo
        run: |
          git config user.email "sync-bot@bioniclabs.xyz"
          git config user.name "Sync Bot"
          git remote add target https://x-access-token:${{ secrets.TARGET_PAT }}@github.com/tradeha42-cloud/bioniclabs19032026.git
          git push target main --force
